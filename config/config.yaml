# config.yaml

project:
  name: "Blueberry Yield Prediction"
  random_seed: 42
  save_dir: "saved_models"
  plot_dir: "plots"

data:
  train_path: "datasets/raw/train.csv"
  test_path: "datasets/raw/test.csv"
  target_col: "yield"
  id_col: "id"

compare_models:
  - "rf"
  - "xgb"
  - "lgbm"

models:
  rf:
    params:
      # 随机森林核心：树的数量、深度、叶子节点最小样本数
      n_estimators: [100, 200, 300, 500]
      max_depth: [5, 10, 15, 20]
      min_samples_split: [2, 5, 10]
      min_samples_leaf: [1, 2, 4]
      max_features: ["sqrt", "log2"] # 增加特征采样策略
    search_params:
      n_iter: 15 # 搜索空间变大，建议稍微增加迭代次数
      cv: 3

  xgb:
    params:
      # XGBoost 核心：学习率、树深度、样本/特征采样、正则化
      n_estimators: [100, 300, 500]
      learning_rate: [0.01, 0.05, 0.1, 0.2]
      max_depth: [3, 5, 7, 9]
      subsample: [0.6, 0.8, 1.0]
      colsample_bytree: [0.6, 0.8, 1.0]
      gamma: [0, 0.1, 0.2] # 增加分裂阈值参数
    search_params:
      n_iter: 20
      cv: 3

  lgbm:
    params:
      # LightGBM 核心：叶子数、学习率、树深度、特征采样
      n_estimators: [100, 300, 500]
      learning_rate: [0.01, 0.05, 0.1]
      num_leaves: [31, 63, 127]
      max_depth: [-1, 5, 10, 15] # -1 表示不限制
      feature_fraction: [0.6, 0.8, 1.0]
      bagging_fraction: [0.6, 0.8, 1.0]
    search_params:
      n_iter: 15
      cv: 3